<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viaje — LovingApp</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
<nav class="navbar" id="navbar"></nav>

<div class="container-md">
    <a href="/pages/trips.html" class="back-link">← Volver a viajes</a>

    <!-- Hero del viaje -->
    <div id="hero-container"><div class="spinner"></div></div>

    <!-- Tabs -->
    <div class="section-tabs" id="tabs" style="display:none;">
        <button class="section-tab active" data-tab="places">Lugares y planes</button>
        <button class="section-tab" data-tab="map">Mapa</button>
        <button class="section-tab" data-tab="info">Información</button>
    </div>

    <!-- Tab: Lugares -->
    <div id="tab-places">
        <div id="alert-container" style="margin-bottom:1rem;"></div>

        <!-- Hospedaje -->
        <div id="accommodation-section" style="display:none;"></div>

        <!-- Formulario agregar lugar -->
        <div class="add-place-form" id="add-form" style="display:none;">
            <div style="font-size:.875rem; font-weight:700; margin-bottom:1rem; color:var(--rose-d);">Agregar lugar</div>
            <form id="place-form" class="form-stack">
                <div class="form-grid form-grid-2">
                    <div class="form-group">
                        <label class="form-label">Nombre del lugar *</label>
                        <input class="form-input" type="text" id="place-name"
                               placeholder="Torre Eiffel, Hotel Roma..." required />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tipo</label>
                        <div class="type-tabs" id="type-selector">
                            <button type="button" class="type-tab active" data-type="attraction">Atracción</button>
                            <button type="button" class="type-tab" data-type="restaurant">Restaurante</button>
                            <button type="button" class="type-tab" data-type="hotel">Alojamiento</button>
                            <button type="button" class="type-tab" data-type="activity">Actividad</button>
                            <button type="button" class="type-tab" data-type="other">Otro</button>
                        </div>
                        <input type="hidden" id="place-type" value="attraction" />
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Link de Google Maps</label>
                    <input class="form-input" type="url" id="place-maps"
                           placeholder="https://maps.google.com/..." />
                    <span style="font-size:.75rem; color:var(--text-3); margin-top:.25rem;">
                        Pegá el link de Google Maps, Waze o cualquier mapa
                    </span>
                </div>
                <div class="form-group">
                    <label class="form-label">Notas</label>
                    <textarea class="form-input" id="place-notes" rows="2"
                              placeholder="Horarios, tips, precio estimado..."></textarea>
                </div>
                <div class="form-actions">
                    <button class="btn btn-primary" type="submit" id="btn-save-place">Agregar</button>
                    <button class="btn btn-ghost" type="button" id="btn-cancel-place">Cancelar</button>
                </div>
            </form>
        </div>

        <!-- Header de sección -->
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem;">
            <div>
                <span style="font-size:.875rem; font-weight:600; color:var(--text-1);">Lugares guardados</span>
                <span style="font-size:.8rem; color:var(--text-3); margin-left:.5rem;" id="places-count"></span>
            </div>
            <button class="btn btn-primary btn-sm" id="btn-add-place">+ Agregar lugar</button>
        </div>

        <!-- Lista de lugares -->
        <div class="places-grid" id="places-list">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Tab: Info del viaje -->
    <div id="tab-info" style="display:none;">
        <div class="surface surface-p">
            <div id="trip-info-content"></div>
        </div>
    </div>

    <!-- Tab: Mapa -->
    <div id="tab-map" style="display:none;">
        <div id="map-loading" style="text-align:center;padding:2rem;">
            <div class="spinner"></div>
            <p style="margin-top:1rem;font-size:.875rem;color:var(--text-3);">Cargando mapa...</p>
        </div>
        <div id="trip-map" style="height:420px;border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;z-index:1;display:none;"></div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const TRIP_ID = parseInt(params.get("id"));
let currentTrip = null;
let editingPlaceId = null;
let timerInterval = null;

// ── Tipo de lugar ─────────────────────────────
const TYPE_CONFIG = {
    restaurant: { label: "Restaurante",  iconKey: "utensils" },
    hotel:      { label: "Alojamiento",  iconKey: "bed"      },
    attraction: { label: "Atracción",    iconKey: "star"     },
    activity:   { label: "Actividad",    iconKey: "lightning"},
    other:      { label: "Otro",         iconKey: "tag"      },
};

const TYPE_ICONS = {
    utensils:  `<svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8.25v-1.5m0 1.5c-1.355 0-2.697.056-4.024.166C6.845 8.51 6 9.473 6 10.608v2.513m6-4.871c1.355 0 2.697.056 4.024.166C17.155 8.51 18 9.473 18 10.608v2.513M15 12H9m6 3H9m-3 2.25V10.608c0-1.135-.845-2.098-1.976-2.192A48.424 48.424 0 0 0 3 8.25m0 6.75A2.25 2.25 0 0 0 5.25 17.25h13.5A2.25 2.25 0 0 0 21 15v-3.75"/></svg>`,
    bed:       `<svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>`,
    star:      `<svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z"/></svg>`,
    lightning: `<svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m3.75 13.5 10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75Z"/></svg>`,
    tag:       `<svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.568 3H5.25A2.25 2.25 0 0 0 3 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 0 0 5.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 0 0 9.568 3Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M6 6h.008v.008H6V6Z"/></svg>`,
};

// ── Hero ──────────────────────────────────────
function renderHero(trip) {
    const today    = new Date();
    const daysLeft = trip.days_left;
    let countdownHtml = "";

    if (daysLeft > 0) {
        countdownHtml = `
            <div class="trip-detail-countdown">
                <div class="trip-detail-countdown-inner">
                    <div style="font-size:.7rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;">Tiempo restante</div>
                    <div style="display:flex;align-items:center;justify-content:center;gap:.5rem;">
                        <span class="trip-detail-countdown-num">${daysLeft}</span>
                        <span class="trip-detail-countdown-unit">días</span>
                    </div>
                    <div class="trip-detail-timer" id="detail-timer">—</div>
                </div>
            </div>`;
    } else if (daysLeft === 0) {
        countdownHtml = `<div style="margin-top:1rem;"><span class="countdown-badge today" style="font-size:.9rem;padding:.5rem 1rem;">Hoy es el día</span></div>`;
    } else {
        countdownHtml = `<div style="margin-top:1rem;"><span class="countdown-badge past">Completado hace ${Math.abs(daysLeft)} días</span></div>`;
    }

    document.getElementById("hero-container").innerHTML = `
        <div class="trip-detail-hero">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
                <div>
                    <div class="trip-detail-title">${trip.destination}</div>
                    <div class="trip-detail-subtitle">${trip.country || ""}</div>
                </div>
                <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
                    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(trip.destination + (trip.country ? ', ' + trip.country : ''))}" target="_blank" rel="noopener" class="btn btn-secondary btn-sm">
                        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:14px;height:14px;"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/></svg>
                        Ver en Maps
                    </a>
                    <a href="/pages/trip-form.html?id=${trip.id}" class="btn btn-secondary btn-sm">Editar viaje</a>
                </div>
            </div>
            <div class="trip-detail-meta">
                <div class="trip-meta-item">
                    <span class="trip-meta-label">Salida</span>
                    <span class="trip-meta-value" style="font-size:.9rem;">${formatDate(trip.departure_date)}</span>
                </div>
                ${trip.return_date ? `
                <div class="trip-meta-item">
                    <span class="trip-meta-label">Regreso</span>
                    <span class="trip-meta-value" style="font-size:.9rem;">${formatDate(trip.return_date)}</span>
                </div>
                <div class="trip-meta-item">
                    <span class="trip-meta-label">Duración</span>
                    <span class="trip-meta-value" style="font-size:.9rem;">${tripDuration(trip.departure_date, trip.return_date)} días</span>
                </div>` : ""}
            </div>
            ${countdownHtml}
        </div>`;

    if (daysLeft > 0) startDetailTimer(trip.departure_date);
}

function tripDuration(dep, ret) {
    if (!ret) return "—";
    return Math.abs(Math.round((new Date(ret) - new Date(dep)) / 86400000));
}

function startDetailTimer(depDate) {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        const el = document.getElementById("detail-timer");
        if (!el) { clearInterval(timerInterval); return; }
        const diff = new Date(depDate + "T00:00:00") - new Date();
        if (diff <= 0) { el.textContent = ""; return; }
        const h = String(Math.floor(diff / 3600000) % 24).padStart(2,"0");
        const m = String(Math.floor(diff / 60000) % 60).padStart(2,"0");
        const s = String(Math.floor(diff / 1000) % 60).padStart(2,"0");
        el.textContent = `${h}:${m}:${s}`;
    }, 1000);
}

// ── Hospedaje ────────────────────────────────
function renderAccommodation(trip) {
    const section = document.getElementById("accommodation-section");
    const a = trip.accommodation_name || trip.accommodation_maps_url;
    if (!a) { section.style.display = "none"; return; }

    const dates = [];
    if (trip.accommodation_checkin) dates.push("Check-in: " + formatDate(trip.accommodation_checkin));
    if (trip.accommodation_checkout) dates.push("Check-out: " + formatDate(trip.accommodation_checkout));

    const mapsLink = trip.accommodation_maps_url
        ? `<a href="${trip.accommodation_maps_url}" target="_blank" rel="noopener" class="place-map-link">
               <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:13px;height:13px;"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/></svg>
               Ver en Google Maps
           </a>`
        : "";

    let mapEmbed = "";
    if (trip.accommodation_maps_url) {
        let embedUrl = "";
        const url = trip.accommodation_maps_url;
        if (url.includes("output=embed")) {
            embedUrl = url;
        } else if (url.match(/google|maps\./i)) {
            const sep = url.includes("?") ? "&" : "?";
            embedUrl = url + sep + "output=embed";
        }
        if (embedUrl) {
            mapEmbed = `<iframe class="accommodation-map" src="${embedUrl}" allowfullscreen loading="lazy"></iframe>`;
        }
    }

    section.innerHTML = `
        <div class="accommodation-card">
            <div class="accommodation-header">
                <span>🏨</span>
                <span>Hospedaje</span>
            </div>
            <div class="accommodation-name">${trip.accommodation_name}</div>
            ${dates.length ? `<div class="accommodation-dates">${dates.join(" — ")}</div>` : ""}
            ${trip.accommodation_notes ? `<div class="accommodation-notes">${trip.accommodation_notes}</div>` : ""}
            ${mapsLink}
            ${mapEmbed}
        </div>`;
    section.style.display = "";
}

// ── Info tab ──────────────────────────────────
function renderInfo(trip) {
    document.getElementById("trip-info-content").innerHTML = `
        <div class="form-stack">
            ${trip.description ? `
            <div>
                <div class="trip-meta-label" style="margin-bottom:.5rem;">Descripción</div>
                <p style="font-size:.9rem;line-height:1.6;color:var(--text-2);">${trip.description}</p>
            </div>
            <div class="divider"></div>` : ""}
            <div class="form-grid form-grid-2">
                <div>
                    <div class="trip-meta-label">Salida</div>
                    <div style="font-size:.95rem;font-weight:600;margin-top:.25rem;">${formatDate(trip.departure_date)}</div>
                </div>
                ${trip.return_date ? `<div>
                    <div class="trip-meta-label">Regreso</div>
                    <div style="font-size:.95rem;font-weight:600;margin-top:.25rem;">${formatDate(trip.return_date)}</div>
                </div>` : ""}
            </div>
        </div>`;
}

// ── Places ────────────────────────────────────
function renderPlaceCard(p) {
    const cfg  = TYPE_CONFIG[p.type] || TYPE_CONFIG.other;
    const icon = TYPE_ICONS[cfg.iconKey] || TYPE_ICONS.tag;
    const mapsLink = p.maps_url
        ? `<a href="${p.maps_url}" target="_blank" rel="noopener" class="place-map-link">
               <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:13px;height:13px;"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/></svg>
               Ver en el mapa
           </a>`
        : "";

    return `
    <div class="place-card" id="place-${p.id}">
        <div class="place-icon ${p.type}">${icon}</div>
        <div class="place-body">
            <div class="place-name">${p.name}</div>
            <div style="font-size:.72rem;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem;">${cfg.label}</div>
            ${p.notes ? `<div class="place-notes">${p.notes}</div>` : ""}
            ${mapsLink}
        </div>
        <div class="place-actions">
            <button class="btn-icon" title="Editar" onclick="startEditPlace(${JSON.stringify(p).replace(/"/g,'&quot;')})">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:14px;height:14px;"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Z"/></svg>
            </button>
            <button class="btn-icon" title="Eliminar" onclick="deletePlace(${p.id}, '${p.name.replace(/'/g,"\\'")}')">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:14px;height:14px;"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"/></svg>
            </button>
        </div>
    </div>`;
}

async function loadPlaces() {
    const list = document.getElementById("places-list");
    try {
        const places = await api.getPlaces(TRIP_ID);
        document.getElementById("places-count").textContent = places.length ? `${places.length} guardados` : "";
        if (!places.length) {
            list.innerHTML = `
                <div class="surface empty-state">
                    <div class="empty-state-icon">
                        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/></svg>
                    </div>
                    <h2>Sin lugares todavía</h2>
                    <p>Agregá restaurantes, hoteles, atracciones o cualquier lugar que quieran visitar.</p>
                </div>`;
            return;
        }
        list.innerHTML = places.map(renderPlaceCard).join("");
    } catch (err) {
        list.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
}

// ── Form de lugar ──────────────────────────────
function resetPlaceForm() {
    document.getElementById("place-form").reset();
    document.getElementById("place-type").value = "attraction";
    document.querySelectorAll(".type-tab").forEach(t => {
        t.classList.toggle("active", t.dataset.type === "attraction");
    });
    document.getElementById("btn-save-place").textContent = "Agregar";
    editingPlaceId = null;
}

function showAddForm() {
    resetPlaceForm();
    document.getElementById("add-form").style.display = "";
    document.getElementById("place-name").focus();
}
function hideAddForm() {
    document.getElementById("add-form").style.display = "none";
    editingPlaceId = null;
}

function startEditPlace(p) {
    editingPlaceId = p.id;
    document.getElementById("place-name").value  = p.name;
    document.getElementById("place-type").value  = p.type;
    document.getElementById("place-maps").value  = p.maps_url || "";
    document.getElementById("place-notes").value = p.notes || "";
    document.querySelectorAll(".type-tab").forEach(t => {
        t.classList.toggle("active", t.dataset.type === p.type);
    });
    document.getElementById("btn-save-place").textContent = "Guardar cambios";
    document.getElementById("add-form").style.display = "";
    document.getElementById("place-name").focus();
}

document.getElementById("place-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("btn-save-place");
    btn.disabled = true;
    const body = {
        name:     document.getElementById("place-name").value.trim(),
        type:     document.getElementById("place-type").value,
        maps_url: document.getElementById("place-maps").value.trim() || null,
        notes:    document.getElementById("place-notes").value.trim() || null,
    };
    try {
        if (editingPlaceId) {
            await api.updatePlace(TRIP_ID, editingPlaceId, body);
        } else {
            await api.createPlace(TRIP_ID, body);
        }
        hideAddForm();
        loadPlaces();
    } catch (err) {
        showAlert("alert-container", err.message, "error");
    } finally {
        btn.disabled = false;
    }
});

async function deletePlace(placeId, name) {
    if (!confirm(`¿Eliminar "${name}"?`)) return;
    try {
        await api.deletePlace(TRIP_ID, placeId);
        loadPlaces();
    } catch (err) {
        showAlert("alert-container", err.message, "error");
    }
}

// ── Type selector ─────────────────────────────
document.getElementById("type-selector").addEventListener("click", (e) => {
    const btn = e.target.closest(".type-tab");
    if (!btn) return;
    document.querySelectorAll(".type-tab").forEach(t => t.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("place-type").value = btn.dataset.type;
});

document.getElementById("btn-add-place").addEventListener("click", showAddForm);
document.getElementById("btn-cancel-place").addEventListener("click", hideAddForm);

// ── Mapa ──────────────────────────────────────
let leafletMap = null;

function extractCoords(url) {
    if (!url) return null;
    const m = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
    if (m) return [parseFloat(m[1]), parseFloat(m[2])];
    return null;
}

async function geocode(query) {
    try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
        const data = await res.json();
        if (data.length) return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
    } catch {}
    return null;
}

async function loadMap() {
    const container = document.getElementById("trip-map");
    const loading   = document.getElementById("map-loading");
    if (leafletMap) { leafletMap.invalidateSize(); return; }

    const places = await api.getPlaces(TRIP_ID);

    const markers = [];
    for (const p of places) {
        const coords = extractCoords(p.maps_url);
        if (coords) markers.push({ coords, place: p });
    }

    let accomCoords = null;
    if (currentTrip.accommodation_maps_url) {
        accomCoords = extractCoords(currentTrip.accommodation_maps_url);
    }

    let center = null;
    if (accomCoords) {
        center = accomCoords;
    } else if (markers.length) {
        const avg = (k) => markers.reduce((s, m) => s + m.coords[k], 0) / markers.length;
        center = [avg(0), avg(1)];
    } else {
        center = await geocode(currentTrip.destination + (currentTrip.country ? ", " + currentTrip.country : ""));
    }
    if (!center) { loading.innerHTML = '<p style="color:var(--text-3);padding:1rem;">No se pudo cargar el mapa</p>'; return; }

    loading.style.display = "none";
    container.style.display = "";
    leafletMap = L.map("trip-map", { zoomControl: true }).setView(center, 13);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 19,
    }).addTo(leafletMap);

    if (accomCoords) {
        const icon = L.divIcon({
            html: '<span style="font-size:1.5rem;">🏨</span>',
            className: "",
            iconSize: [24, 24],
            iconAnchor: [12, 12],
        });
        L.marker(accomCoords, { icon }).addTo(leafletMap)
            .bindPopup(`<b>${currentTrip.accommodation_name || "Hospedaje"}</b><br><span style="color:var(--text-3);">Alojamiento</span>`)
            .openPopup();
    }

    markers.forEach(({ coords, place }) => {
        const cfg = TYPE_CONFIG[place.type] || TYPE_CONFIG.other;
        L.marker(coords).addTo(leafletMap)
            .bindPopup(`<b>${place.name}</b><br><span style="color:var(--text-3);">${cfg.label}</span>`);
    });
}

function destroyMap() {
    if (leafletMap) { leafletMap.remove(); leafletMap = null; }
}

// ── Tabs ──────────────────────────────────────
document.querySelectorAll(".section-tab").forEach(tab => {
    tab.addEventListener("click", async () => {
        document.querySelectorAll(".section-tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        const target = tab.dataset.tab;
        document.getElementById("tab-places").style.display = target === "places" ? "" : "none";
        document.getElementById("tab-map").style.display    = target === "map"    ? "" : "none";
        document.getElementById("tab-info").style.display   = target === "info"   ? "" : "none";
        if (target === "map") {
            await loadMap();
        } else {
            destroyMap();
        }
    });
});

// ── Init ──────────────────────────────────────
(async () => {
    const user = await requireAuth();
    if (!user || !TRIP_ID) { window.location.href = "/pages/trips.html"; return; }

    try {
        currentTrip = await api.getTrip(TRIP_ID);
        document.title = `${currentTrip.destination} — LovingApp`;
        renderHero(currentTrip);
        renderAccommodation(currentTrip);
        renderInfo(currentTrip);
        document.getElementById("tabs").style.display = "";
        loadPlaces();
    } catch {
        window.location.href = "/pages/trips.html";
    }
})();
</script>
</body>
</html>
