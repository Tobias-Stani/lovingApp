<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ingresar — LovingApp</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="login-page">
    <!-- Left panel -->
    <div class="login-left">
        <div class="login-left-brand">Loving<span>App</span></div>
        <div class="login-left-quote">
            "El amor no se mide en palabras,<br>
            sino en los momentos que elegimos<br>
            <strong>vivir juntos.</strong>"
        </div>
        <div class="login-left-tag">Planifica. Viaja. Recuerda.</div>
    </div>

    <!-- Right panel -->
    <div class="login-right">
        <div class="login-box">
            <h1 class="login-heading">Bienvenido</h1>
            <p class="login-sub">Ingresá con tu cuenta para continuar</p>

            <div id="alert-container" style="margin-bottom:1rem;"></div>

            <form id="login-form" class="form-stack">
                <div class="form-group">
                    <label class="form-label" for="username">Usuario</label>
                    <input class="form-input" type="text" id="username"
                           placeholder="tu_usuario" autocomplete="username" required />
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <input class="form-input" type="password" id="password"
                           placeholder="••••••••" autocomplete="current-password" required />
                </div>
                <button class="btn btn-primary" type="submit" id="btn-login"
                        style="width:100%; margin-top:0.25rem; padding:.7rem;">
                    Ingresar
                </button>
            </form>
        </div>
    </div>
</div>

<script src="/js/config.js"></script>
<script src="/js/api.js"></script>
<script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btn-login");
        btn.disabled = true;
        btn.textContent = "Ingresando...";
        try {
            await api.login({
                username: document.getElementById("username").value.trim(),
                password: document.getElementById("password").value,
            });
            window.location.href = "/pages/trips.html";
        } catch (err) {
            document.getElementById("alert-container").innerHTML =
                `<div class="alert alert-error">${err.message}</div>`;
            btn.disabled = false;
            btn.textContent = "Ingresar";
        }
    });
</script>
</body>
</html>
