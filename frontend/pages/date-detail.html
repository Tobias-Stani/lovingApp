<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Date — LovingApp</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .back-link { display:inline-block;font-size:.85rem;color:var(--text-3);margin-bottom:1rem;text-decoration:none; }
        .back-link:hover { color:var(--rose); }
        .detail-hero {
            width:100%;height:350px;object-fit:cover;border-radius:var(--radius-lg);
            background:var(--bg-2);display:block;cursor:pointer;
        }
        .detail-hero-placeholder {
            width:100%;height:350px;border-radius:var(--radius-lg);
            background:linear-gradient(135deg,#fce4ec,#fff3e0);
            display:flex;align-items:center;justify-content:center;font-size:5rem;
        }
        .detail-header {
            display:flex;align-items:flex-start;justify-content:space-between;
            flex-wrap:wrap;gap:1rem;margin:1.25rem 0 .5rem;
        }
        .detail-title { font-size:1.5rem;font-weight:700;color:var(--text-1); }
        .detail-meta {
            display:flex;flex-wrap:wrap;gap:1rem;
            margin-bottom:1rem;font-size:.85rem;color:var(--text-3);
        }
        .detail-meta-item { display:flex;align-items:center;gap:.35rem; }
        .detail-desc {
            font-size:.9rem;line-height:1.6;color:var(--text-2);
            margin-bottom:1.5rem;padding:1rem 1.25rem;
            background:#fff;border-radius:var(--radius-lg);box-shadow:0 1px 8px rgba(0,0,0,.06);
        }

        .section-title {
            font-size:1rem;font-weight:700;color:var(--text-1);
            margin-bottom:1rem;display:flex;align-items:center;gap:.5rem;
        }
        .surface-p { background:#fff;border-radius:var(--radius-lg);box-shadow:0 1px 8px rgba(0,0,0,.06);padding:1.25rem; }

        .photos-grid {
            display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
            gap:.5rem;margin-bottom:1rem;
        }
        .photo-item { position:relative;display:inline-block; }
        .photo-item img {
            width:100%;height:160px;object-fit:cover;border-radius:8px;
            cursor:pointer;transition:transform .15s;display:block;
        }
        .photo-item img:hover { transform:scale(1.03); }
        .photo-del {
            position:absolute;top:4px;right:4px;width:28px;height:28px;
            border-radius:50%;border:none;background:rgba(0,0,0,.55);color:#fff;
            font-size:1.1rem;line-height:1;cursor:pointer;display:flex;
            align-items:center;justify-content:center;opacity:0;
            transition:opacity .15s;padding:0;
        }
        .photo-item:hover .photo-del { opacity:1; }
        .photo-del:hover { background:rgba(200,0,0,.8); }

        .act-timeline { position:relative;padding-left:2rem; }
        .act-timeline::before {
            content:"";position:absolute;left:10px;top:8px;bottom:0;
            width:2px;background:#e2e8f0;border-radius:1px;
        }
        .act-item {
            position:relative;margin-bottom:.5rem;
            background:var(--bg-2,#f8fafc);border-radius:var(--radius-md);
            display:flex;align-items:flex-start;gap:.5rem;
            cursor:default;transition:opacity .15s,box-shadow .15s;
        }
        .act-item.dragging { opacity:.4; }
        .act-item.drag-over { box-shadow:0 0 0 2px var(--rose); }
        .act-item::before {
            content:"";position:absolute;left:-1.6rem;top:1rem;
            width:12px;height:12px;border-radius:50%;
            background:var(--rose);border:2px solid #fff;box-shadow:0 0 0 2px var(--rose);
        }
        .act-drag-handle {
            padding:.75rem 0 .75rem .75rem;font-size:1.1rem;color:var(--text-3);
            cursor:grab;user-select:none;line-height:1.5;
        }
        .act-drag-handle:active { cursor:grabbing; }
        .act-body { flex:1;padding:.75rem 1rem .75rem 0;min-width:0; }
        .act-time {
            font-size:.75rem;font-weight:600;color:var(--rose);
            text-transform:uppercase;letter-spacing:.05em;
        }
        .act-title { font-size:.9rem;font-weight:600;color:var(--text-1);margin-top:.15rem; }
        .act-desc { font-size:.8rem;color:var(--text-2);margin-top:.2rem;line-height:1.4; }
        .act-actions { margin-top:.3rem;display:flex;gap:.5rem;font-size:.75rem; }
        .act-actions button { background:none;border:none;cursor:pointer;color:var(--text-3);padding:0; }
        .act-actions button:hover { color:var(--rose); }

        .lightbox {
            position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.92);
            display:flex;align-items:center;justify-content:center;cursor:pointer;
        }
        .lightbox img { max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px; }
        .lightbox-close {
            position:absolute;top:1rem;right:1.5rem;color:#fff;font-size:2rem;
            cursor:pointer;background:none;border:none;
        }
        .lightbox-nav {
            position:absolute;top:50%;transform:translateY(-50%);
            color:#fff;font-size:2.5rem;cursor:pointer;
            background:rgba(0,0,0,.3);border:none;border-radius:50%;
            width:50px;height:50px;display:flex;align-items:center;justify-content:center;
        }
        .lightbox-prev { left:1rem; }
        .lightbox-next { right:1rem; }
        .lightbox-nav:hover { background:rgba(0,0,0,.6); }

        .inline-form {
            display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;
            margin-top:.75rem;
        }
        .inline-form input,.inline-form textarea {
            border:1px solid var(--border);border-radius:8px;padding:.5rem .75rem;
            font-size:.85rem;font-family:inherit;outline:none;background:#fff;
            flex:1;min-width:120px;
        }
        .inline-form input:focus { border-color:var(--rose); }

        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @keyframes scaleIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
        .modal-overlay {
            position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
            background:rgba(0,0,0,.45);backdrop-filter:blur(3px);animation:fadeIn .2s ease;
        }
        .modal-box {
            background:#fff;border-radius:16px;padding:2rem;max-width:520px;width:90%;
            max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:scaleIn .2s ease;
        }
        .modal-title { font-size:1.2rem;font-weight:700;color:var(--text-1);margin-bottom:1.25rem; }
        .modal-close { float:right;background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--text-3);padding:0 .25rem;line-height:1; }
        .modal-close:hover { color:var(--text-1); }
        .form-stack { display:flex;flex-direction:column;gap:1rem; }
    </style>
</head>
<body>
<nav class="navbar" id="navbar"></nav>

<div class="container-md">
    <a href="/pages/dates.html" class="back-link">← Volver a Dates</a>
    <div id="date-content"><div class="spinner"></div></div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const DATE_ID = parseInt(params.get("id"));
let _currentDate = null;
let _currentUser = null;

function photoUrl(photoId, thumb = false) {
    return `/api/dates/photos/${photoId}/image${thumb ? "?thumbnail=true" : ""}`;
}

function escapeHtml(str) { return (str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function formatDateVerbose(iso) {
    if (!iso) return "";
    const [y,m,d] = iso.split("-");
    const months = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
    return `${parseInt(d)} de ${months[parseInt(m)-1]} de ${y}`;
}

// ── Lightbox ──────────────────────────
function showLightbox(photos, idx) {
    const el = document.createElement("div"); el.className = "lightbox";
    el.onclick = (e) => { if (e.target===el) el.remove(); };
    let touchStartX = 0;
    el.addEventListener("touchstart", (e) => { touchStartX = e.touches[0].clientX; }, {passive:true});
    el.addEventListener("touchend", (e) => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(dx) > 60) {
            const currentIdx = parseInt(el.dataset.idx || "0");
            const dir = dx > 0 ? -1 : 1;
            const newIdx = currentIdx + dir;
            if (newIdx >= 0 && newIdx < photos.length) {
                renderLightboxContent(el, photos, newIdx);
            }
        }
    }, {passive:true});
    renderLightboxContent(el, photos, idx);
    document.body.appendChild(el);
}
function renderLightboxContent(el, photos, idx) {
    el.dataset.idx = idx;
    el.innerHTML = `
        <button class="lightbox-close" id="lb-close">&times;</button>
        ${idx > 0 ? `<button class="lightbox-nav lightbox-prev" id="lb-prev">‹</button>` : ""}
        <img src="${photoUrl(photos[idx].id)}" />
        ${idx < photos.length-1 ? `<button class="lightbox-nav lightbox-next" id="lb-next">›</button>` : ""}
    `;
    document.getElementById("lb-close").onclick = () => el.remove();
    const prev = document.getElementById("lb-prev");
    const next = document.getElementById("lb-next");
    if (prev) prev.onclick = (e) => { e.stopPropagation(); renderLightboxContent(el, photos, idx-1); };
    if (next) next.onclick = (e) => { e.stopPropagation(); renderLightboxContent(el, photos, idx+1); };
    const handler = (ev) => {
        if (ev.key === "Escape") { el.remove(); document.removeEventListener("keydown", handler); }
        if (ev.key === "ArrowLeft" && prev) { renderLightboxContent(el, photos, idx-1); document.removeEventListener("keydown", handler); }
        if (ev.key === "ArrowRight" && next) { renderLightboxContent(el, photos, idx+1); document.removeEventListener("keydown", handler); }
    };
    document.addEventListener("keydown", handler);
}

// ── Render ────────────────────────────
function renderDate() {
    const d = _currentDate;
    const photos = d.photos || [];

    const heroHtml = photos.length
        ? `<img class="detail-hero" src="${photoUrl(photos[0].id, true)}" alt="${escapeHtml(d.title)}" onclick="showLightbox(_currentDate.photos, 0)" />`
        : `<div class="detail-hero-placeholder">💕</div>`;

    const locHtml = d.location_name
        ? `<span class="detail-meta-item">📍 ${escapeHtml(d.location_name)}</span>` : "";

    const mapsBtn = d.maps_url
        ? `<a href="${d.maps_url}" target="_blank" rel="noopener" class="btn btn-secondary btn-sm">Ver en Maps</a>` : "";

    const photosHtml = photos.length ? `
        <div class="surface-p" style="margin-bottom:1.5rem;">
            <div class="section-title">📷 Fotos <span style="font-weight:400;font-size:.8rem;color:var(--text-3);">(${photos.length})</span></div>
            <div class="photos-grid" id="photos-grid">
                ${photos.map((p,i) => `
                <div class="photo-item">
                    <img src="${photoUrl(p.id, true)}" onclick="showLightbox(_currentDate.photos, ${i})" loading="lazy" />
                    <button class="photo-del" onclick="deletePhoto(${p.id}, event)" title="Eliminar foto">&times;</button>
                </div>`).join("")}
            </div>
            <form id="add-photo-form" class="inline-form" style="margin-top:.5rem;">
                <input type="file" accept="image/*" multiple required style="flex:1;padding:.4rem;" />
                <button class="btn btn-primary btn-sm" type="submit">+ Agregar</button>
            </form>
        </div>` : `
        <div class="surface-p" style="margin-bottom:1.5rem;">
            <div class="section-title">📷 Fotos</div>
            <div style="text-align:center;padding:1.5rem;color:var(--text-3);font-size:.85rem;">
                Todavía no hay fotos
            </div>
            <form id="add-photo-form" class="inline-form" style="margin-top:.5rem;">
                <input type="file" accept="image/*" multiple required style="flex:1;padding:.4rem;" />
                <button class="btn btn-primary btn-sm" type="submit">+ Agregar fotos</button>
            </form>
        </div>`;

    const acts = d.activities || [];
    const actsHtml = `
        <div class="surface-p" style="margin-bottom:1.5rem;">
            <div class="section-title">📋 Actividades <span style="font-weight:400;font-size:.8rem;color:var(--text-3);">(${acts.length})</span></div>
            <div class="act-timeline" id="act-timeline">
                ${acts.length ? acts.map(a => `
                    <div class="act-item" id="act-${a.id}" draggable="true" data-act-id="${a.id}">
                        <div class="act-drag-handle">⠿</div>
                        <div class="act-body">
                            ${a.time_at ? `<div class="act-time">${a.time_at}</div>` : ""}
                            <div class="act-title">${escapeHtml(a.title)}</div>
                            ${a.description ? `<div class="act-desc">${escapeHtml(a.description)}</div>` : ""}
                            <div class="act-actions">
                                <button onclick="deleteActivity(${a.id})">Eliminar</button>
                            </div>
                        </div>
                    </div>
                `).join("") : `<div style="font-size:.85rem;color:var(--text-3);padding:.5rem 0;">Todavía no hay actividades</div>`}
            </div>
            <form id="add-act-form" class="inline-form" style="margin-top:.75rem;">
                <input type="time" id="act-time" style="max-width:120px;" placeholder="Hora" />
                <input type="text" id="act-title" required placeholder="Qué hicieron..." style="flex:2;" />
                <button class="btn btn-primary btn-sm" type="submit">+ Agregar</button>
            </form>
        </div>`;

    const editDeleteHtml = `
        <div style="display:flex;gap:.5rem;margin-bottom:2rem;">
            <button class="btn btn-secondary btn-sm" id="btn-edit-date">Editar info</button>
            <button class="btn btn-ghost btn-sm" style="color:var(--rose);" id="btn-delete-date">Eliminar</button>
        </div>`;

    document.getElementById("date-content").innerHTML = `
        ${heroHtml}
        <div class="detail-header">
            <div class="detail-title">${escapeHtml(d.title)}</div>
            <div>${mapsBtn}</div>
        </div>
        <div class="detail-meta">
            <span class="detail-meta-item">📅 ${formatDateVerbose(d.date_occurred)}</span>
            ${locHtml}
        </div>
        ${d.description ? `<div class="detail-desc">${escapeHtml(d.description)}</div>` : ""}
        ${photosHtml}
        ${actsHtml}
        ${editDeleteHtml}
        <div id="map-container" style="height:300px;border-radius:var(--radius-lg);overflow:hidden;margin-bottom:2rem;display:none;"></div>
    `;

    // Map
    if (d.maps_url) loadMap(d);

    // Drag & drop activities (desktop + touch)
    const timeline = document.getElementById("act-timeline");
    let dragSrcId = null;
    let _touchActId = null;
    if (timeline) {
        const getActId = (el) => el?.closest(".act-item")?.dataset?.actId || null;

        async function commitReorder() {
            const ids = [...timeline.querySelectorAll(".act-item")].map(el => parseInt(el.dataset.actId));
            try {
                await api.reorderActivities(DATE_ID, ids);
            } catch (err) {
                await refreshDate();
            }
        }

        // HTML5 DnD (desktop)
        timeline.addEventListener("dragstart", (e) => {
            const item = e.target.closest(".act-item");
            if (!item) return;
            dragSrcId = item.dataset.actId;
            item.classList.add("dragging");
            e.dataTransfer.effectAllowed = "move";
            e.dataTransfer.setData("text/plain", dragSrcId);
        });
        timeline.addEventListener("dragend", () => {
            document.querySelectorAll(".act-item").forEach(el => el.classList.remove("dragging","drag-over"));
        });
        timeline.addEventListener("dragover", (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";
            const item = e.target.closest(".act-item");
            if (!item || item.dataset.actId === dragSrcId) return;
            document.querySelectorAll(".act-item").forEach(el => el.classList.remove("drag-over"));
            item.classList.add("drag-over");
        });
        timeline.addEventListener("dragleave", (e) => {
            e.target.closest(".act-item")?.classList.remove("drag-over");
        });
        timeline.addEventListener("drop", async (e) => {
            e.preventDefault();
            const target = e.target.closest(".act-item");
            if (!target || !dragSrcId || target.dataset.actId === dragSrcId) return;
            document.querySelectorAll(".act-item").forEach(el => el.classList.remove("drag-over"));
            const src = document.querySelector(`.act-item[data-act-id="${dragSrcId}"]`);
            if (!src) return;
            const rect = target.getBoundingClientRect();
            if (e.clientY > rect.top + rect.height / 2)
                target.parentNode.insertBefore(src, target.nextSibling);
            else
                target.parentNode.insertBefore(src, target);
            await commitReorder();
        });

        // Touch DnD (mobile)
        let touchGhost = null;
        let touchSrc = null;
        timeline.addEventListener("touchstart", (e) => {
            const handle = e.target.closest(".act-drag-handle");
            if (!handle) return;
            touchSrc = handle.closest(".act-item");
            if (!touchSrc) return;
            touchSrc.classList.add("dragging");
            touchGhost = touchSrc.cloneNode(true);
            touchGhost.style.position = "fixed";
            touchGhost.style.pointerEvents = "none";
            touchGhost.style.opacity = ".7";
            touchGhost.style.width = touchSrc.offsetWidth + "px";
            touchGhost.style.zIndex = "99999";
            touchGhost.style.transform = "scale(1.02)";
            touchGhost.style.boxShadow = "0 8px 30px rgba(0,0,0,.15)";
            document.body.appendChild(touchGhost);
        }, {passive:true});
        timeline.addEventListener("touchmove", (e) => {
            if (!touchGhost) return;
            e.preventDefault();
            const t = e.touches[0];
            touchGhost.style.left = (t.clientX - touchGhost.offsetWidth / 2) + "px";
            touchGhost.style.top = (t.clientY - 40) + "px";
            document.querySelectorAll(".act-item").forEach(el => el.classList.remove("drag-over"));
            const target = document.elementFromPoint(t.clientX, t.clientY)?.closest(".act-item");
            if (target && target !== touchSrc) target.classList.add("drag-over");
        }, {passive:false});
        timeline.addEventListener("touchend", async (e) => {
            if (!touchGhost || !touchSrc) return;
            touchGhost.remove(); touchGhost = null;
            document.querySelectorAll(".act-item").forEach(el => el.classList.remove("dragging","drag-over"));
            const t = e.changedTouches[0];
            const target = document.elementFromPoint(t.clientX, t.clientY)?.closest(".act-item");
            if (target && target !== touchSrc) {
                const rect = target.getBoundingClientRect();
                if (t.clientY > rect.top + rect.height / 2)
                    target.parentNode.insertBefore(touchSrc, target.nextSibling);
                else
                    target.parentNode.insertBefore(touchSrc, target);
                await commitReorder();
            }
            touchSrc = null;
        }, {passive:true});
    }

    // Photo upload
    document.getElementById("add-photo-form").onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector("button[type=submit]");
        const input = e.target.querySelector("input[type=file]");
        if (!input.files.length) return;
        btn.disabled = true;
        btn.textContent = "Subiendo...";
        try {
            const fd = new FormData();
            for (const f of input.files) fd.append("photos", f);
            await api.addDatePhotos(DATE_ID, fd);
            input.value = "";
            await refreshDate();
        } catch (err) {
            alert("Error al subir fotos: " + err.message);
        } finally {
            btn.disabled = false;
            btn.textContent = "+ Agregar";
        }
    };

    // Add activity
    document.getElementById("add-act-form").onsubmit = async (e) => {
        e.preventDefault();
        const title = document.getElementById("act-title").value.trim();
        if (!title) return;
        const fd = new FormData();
        fd.append("title", title);
        const time = document.getElementById("act-time").value;
        if (time) fd.append("time_at", time);
        await api.createDateActivity(DATE_ID, fd);
        document.getElementById("act-title").value = "";
        document.getElementById("act-time").value = "";
        await refreshDate();
    };

    document.getElementById("btn-edit-date").onclick = showEditForm;
    document.getElementById("btn-delete-date").onclick = async () => {
        if (!confirm(`¿Eliminar "${d.title}"?`)) return;
        await api.deleteDate(DATE_ID);
        window.location.href = "/pages/dates.html";
    };
}

async function refreshDate() {
    _currentDate = await api.getDate(DATE_ID);
    renderDate();
}

function deleteActivity(actId) {
    api.deleteDateActivity(actId).then(refreshDate);
}

function deletePhoto(photoId, event) {
    if (event) event.stopPropagation();
    if (!confirm("¿Eliminar esta foto?")) return;
    api.deleteDatePhoto(photoId).then(refreshDate);
}

function showEditForm() {
    const d = _currentDate;
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
        <div class="modal-box">
            <button class="modal-close" id="modal-close">&times;</button>
            <div class="modal-title">Editar fecha</div>
            <form id="edit-form" class="form-stack">
                <div class="form-group">
                    <label class="form-label">Título</label>
                    <input class="form-input" type="text" id="e-title" value="${escapeHtml(d.title)}">
                </div>
                <div class="form-group">
                    <label class="form-label">Fecha</label>
                    <input class="form-input" type="date" id="e-date" value="${d.date_occurred}">
                </div>
                <div class="form-group">
                    <label class="form-label">Ubicación</label>
                    <input class="form-input" type="text" id="e-location" value="${escapeHtml(d.location_name || "")}">
                </div>
                <div class="form-group">
                    <label class="form-label">Link de Google Maps</label>
                    <input class="form-input" type="url" id="e-maps" value="${escapeHtml(d.maps_url || "")}">
                </div>
                <div class="form-group">
                    <label class="form-label">Descripción</label>
                    <textarea class="form-input" id="e-desc" rows="3">${escapeHtml(d.description || "")}</textarea>
                </div>
                <div style="margin-top:.5rem;display:flex;gap:.5rem;">
                    <button class="btn btn-primary" type="submit">Guardar</button>
                    <button class="btn btn-ghost" type="button" id="btn-cancel-edit">Cancelar</button>
                </div>
            </form>
        </div>`;
    document.body.appendChild(overlay);
    document.getElementById("modal-close").onclick = () => overlay.remove();
    document.getElementById("btn-cancel-edit").onclick = () => overlay.remove();
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    document.getElementById("edit-form").onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector("button[type=submit]");
        btn.disabled = true; btn.textContent = "Guardando...";
        try {
            const fd = new FormData();
            fd.append("title", document.getElementById("e-title").value.trim());
            fd.append("date_occurred", document.getElementById("e-date").value);
            const loc = document.getElementById("e-location").value.trim();
            if (loc) fd.append("location_name", loc);
            const maps = document.getElementById("e-maps").value.trim();
            if (maps) fd.append("maps_url", maps);
            const desc = document.getElementById("e-desc").value.trim();
            if (desc) fd.append("description", desc);
            await api.updateDate(DATE_ID, fd);
            overlay.remove();
            await refreshDate();
            document.querySelector(".detail-hero, .detail-hero-placeholder")?.scrollIntoView({ behavior: "smooth" });
        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            btn.disabled = false; btn.textContent = "Guardar";
        }
    };
}

function loadMap(d) {
    const coords = (d.maps_url || "").match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
    if (!coords) { document.getElementById("map-container").style.display = "none"; return; }
    const lat = parseFloat(coords[1]), lng = parseFloat(coords[2]);
    const mapEl = document.getElementById("map-container");
    mapEl.style.display = "";
    mapEl.innerHTML = "";
    const map = L.map(mapEl).setView([lat, lng], 15);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: '&copy; OpenStreetMap', maxZoom: 19,
    }).addTo(map);
    L.marker([lat, lng]).addTo(map);
    if (d.location_name) mapEl.scrollIntoView({ behavior: "smooth" });
}

(async () => {
    const user = await requireAuth();
    if (!user || !DATE_ID) { window.location.href = "/pages/dates.html"; return; }
    _currentUser = user;
    _currentDate = await api.getDate(DATE_ID);
    document.title = `${_currentDate.title} — LovingApp`;
    renderDate();
})();
</script>
