services:
  db:
    image: postgres:16-alpine
    container_name: lovingapp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loving}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lovingpass}
      POSTGRES_DB: ${POSTGRES_DB:-lovingapp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loving}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lovingapp_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-loving}:${POSTGRES_PASSWORD:-lovingpass}@db:5432/${POSTGRES_DB:-lovingapp}
    ports:
      - "8088:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lovingapp_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
