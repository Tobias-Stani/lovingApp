services:
  db:
    image: postgres:16-alpine
    container_name: lovingapp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loving}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lovingpass}
      POSTGRES_DB: ${POSTGRES_DB:-lovingapp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loving} -d ${POSTGRES_DB:-lovingapp}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lovingapp_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8088:8000"
    command: sh -c "python create_admin.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lovingapp_web
    restart: unless-stopped
    environment:
      PORT: "3000"
      BACKEND_URL: "https://backend-production-a3b1b.up.railway.app"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/js:/usr/share/nginx/html/js
      - ./frontend/css:/usr/share/nginx/html/css
      - ./frontend/pages:/usr/share/nginx/html/pages
      - ./frontend/index.html:/usr/share/nginx/html/index.html

volumes:
  postgres_data:
